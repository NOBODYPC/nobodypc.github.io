<!DOCTYPE html>
<html>
<head>
    <title>C2 Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Consolas', monospace; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { color: #00ff00; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .login-box { max-width: 400px; margin: 100px auto; background: #1a1a1a; padding: 30px; border-radius: 10px; }
        input, button { padding: 10px; margin: 10px 0; width: 100%; background: #333; color: #fff; border: none; }
        button { background: #00ff00; color: #000; cursor: pointer; font-weight: bold; }
        button:hover { background: #00cc00; }
        .computers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; margin-top: 20px; }
        .computer-card { background: #1a1a1a; border-radius: 10px; padding: 15px; border-left: 4px solid #00ff00; cursor: pointer; transition: 0.2s; }
        .computer-card:hover { background: #222; }
        .computer-card.offline { border-left-color: #ff0000; opacity: 0.6; }
        .computer-name { font-size: 18px; font-weight: bold; color: #00ff00; }
        .computer-ip { color: #888; font-size: 12px; margin-top: 5px; }
        .computer-time { color: #555; font-size: 10px; margin-top: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { background: #1a1a1a; margin: 2% auto; padding: 20px; width: 90%; max-width: 1200px; border-radius: 10px; max-height: 90%; overflow-y: auto; }
        .close { float: right; cursor: pointer; font-size: 28px; color: #ff0000; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab { padding: 8px 16px; background: #333; cursor: pointer; border-radius: 5px; }
        .tab.active { background: #00ff00; color: #000; }
        pre { background: #000; padding: 10px; overflow-x: auto; font-size: 12px; border-radius: 5px; }
        textarea { background: #333; color: #fff; border: none; padding: 10px; width: 100%; font-family: monospace; }
        .command-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .cmd-btn { background: #2a2a2a; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .cmd-btn:hover { background: #3a3a3a; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #2a2a2a; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginSection" class="login-box">
        <h2>C2 ADMIN LOGIN</h2>
        <input type="password" id="passwordInput" placeholder="Admin password">
        <button onclick="loginFunc()">Login</button>
    </div>
    
    <div id="mainSection" style="display:none;">
        <h1>C2 COMMAND AND CONTROL</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('computers')">[ COMPUTERS ]</div>
            <div class="tab" onclick="showTab('commands')">[ COMMANDS ]</div>
            <div class="tab" onclick="showTab('reports')">[ REPORTS ]</div>
            <div class="tab" onclick="showTab('library')">[ COMMAND LIBRARY ]</div>
            <div class="tab" onclick="showTab('info')">[ SYSTEM INFO ]</div>
        </div>
        
        <div id="computersTab">
            <div class="computers-grid" id="computersList">Loading...</div>
        </div>
        
        <div id="commandsTab" style="display:none;">
            <h3>Send Command</h3>
            <select id="targetComputer" style="background:#333; color:#fff; padding:8px; width:100%; margin-bottom:10px;">
                <option value="all">ALL COMPUTERS</option>
            </select>
            <textarea id="commandInput" rows="3" placeholder="Enter command..."></textarea>
            <button onclick="sendCustomCommand()" style="width:auto; margin-top:10px;">[ SEND ]</button>
            
            <h3 style="margin-top:20px;">Quick Commands</h3>
            <div class="command-buttons" id="quickCommands"></div>
            
            <h3 style="margin-top:20px;">Command Results</h3>
            <pre id="commandResults">No commands yet</pre>
        </div>
        
        <div id="reportsTab" style="display:none;">
            <pre id="reportsContent">No reports yet</pre>
        </div>
        
        <div id="libraryTab" style="display:none;">
            <h3>Windows Command Library</h3>
            <table id="commandLibrary">
                <tr><th>Category</th><th>Command</th><th>Description</th></tr>
            </table>
        </div>
        
        <div id="infoTab" style="display:none;">
            <h3>Windows System Info</h3>
            <pre id="sysInfo">Loading...</pre>
            <h3>Supported Commands</h3>
            <pre id="procInfo">Loading...</pre>
        </div>
    </div>
</div>

<div id="computerModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "08319752026";
    
    let currentComputerId = null;
    let computers = [];
    
    const commandLibrary = [
        { cat: "INFO", cmd: "systeminfo", desc: "Full system information" },
        { cat: "INFO", cmd: "hostname", desc: "Computer name" },
        { cat: "INFO", cmd: "whoami", desc: "Current user" },
        { cat: "INFO", cmd: "ipconfig /all", desc: "Network configuration" },
        { cat: "PROCESS", cmd: "tasklist", desc: "List running processes" },
        { cat: "PROCESS", cmd: "taskkill /f /im notepad.exe", desc: "Kill notepad" },
        { cat: "FILE", cmd: "dir C:\\Users", desc: "List users directory" },
        { cat: "FILE", cmd: "dir C:\\Users\\%USERNAME%\\Desktop", desc: "List desktop" },
        { cat: "NETWORK", cmd: "netstat -an", desc: "Network connections" },
        { cat: "WIFI", cmd: "netsh wlan show profiles", desc: "List WiFi profiles" },
        { cat: "POWERSHELL", cmd: "powershell -Command \"Get-Process\"", desc: "PowerShell processes" }
    ];
    
    const quickCommands = [
        "systeminfo", "ipconfig /all", "tasklist", "whoami", "hostname",
        "dir C:\\Users", "netstat -an", "netsh wlan show profiles"
    ];
    
    // ==========================================
    // LOGIN
    // ==========================================
    window.loginFunc = function() {
        const pwd = document.getElementById('passwordInput').value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainSection').style.display = 'block';
            
            loadComputers();
            loadCommandLibrary();
            loadQuickCommands();
            loadSystemInfo();
            
            setInterval(loadComputers, 30000);
        } else {
            alert('Wrong password!');
        }
    };
    
    // ==========================================
    // COMPUTERS (SIMULATION - NO SUPA BASE)
    // ==========================================
    function loadComputers() {
        const stored = localStorage.getItem('computers');
        if (stored) {
            computers = JSON.parse(stored);
        } else {
            computers = [
                { id: 1, name: 'DESKTOP-ABC123', ip: '192.168.1.10', username: 'Admin', os: 'Windows 11', last_seen: new Date().toISOString() },
                { id: 2, name: 'LAPTOP-XYZ789', ip: '192.168.1.20', username: 'User', os: 'Windows 10', last_seen: new Date(Date.now() - 180000).toISOString() }
            ];
            localStorage.setItem('computers', JSON.stringify(computers));
        }
        
        // Update dropdown
        const select = document.getElementById('targetComputer');
        if (select) {
            select.innerHTML = '<option value="all">ALL COMPUTERS</option>';
            computers.forEach(comp => {
                select.innerHTML += `<option value="${comp.id}">${comp.name} (${comp.ip})</option>`;
            });
        }
        
        const container = document.getElementById('computersList');
        container.innerHTML = '';
        
        computers.forEach(comp => {
            const lastSeen = new Date(comp.last_seen);
            const isOnline = (Date.now() - lastSeen) < 120000;
            
            const card = document.createElement('div');
            card.className = `computer-card ${isOnline ? 'online' : 'offline'}`;
            card.onclick = () => showComputerDetails(comp);
            card.innerHTML = `
                <div class="computer-name">${isOnline ? '●' : '○'} ${comp.name}</div>
                <div class="computer-ip">IP: ${comp.ip || 'N/A'} | User: ${comp.username || 'N/A'}</div>
                <div class="computer-ip">OS: ${comp.os || 'Windows'}</div>
                <div class="computer-time">Last seen: ${lastSeen.toLocaleString()}</div>
            `;
            container.appendChild(card);
        });
    }
    
    function showComputerDetails(computer) {
        currentComputerId = computer.id;
        
        const modal = document.getElementById('computerModal');
        const content = document.getElementById('modalContent');
        
        content.innerHTML = `
            <h2>${computer.name}</h2>
            <p><strong>IP:</strong> ${computer.ip} | <strong>User:</strong> ${computer.username}</p>
            <p><strong>OS:</strong> ${computer.os} | <strong>Last seen:</strong> ${new Date(computer.last_seen).toLocaleString()}</p>
            <div style="margin-top:20px">
                <h3>Execute Command</h3>
                <textarea id="singleCommand" rows="3" style="width:100%"></textarea>
                <button onclick="sendSingleCommand()">Send Command</button>
                <div id="cmdResult" style="margin-top:10px;"></div>
            </div>
        `;
        
        modal.style.display = 'block';
    }
    
    // ==========================================
    // COMMANDS
    // ==========================================
    window.sendCustomCommand = function() {
        const cmd = document.getElementById('commandInput').value;
        const target = document.getElementById('targetComputer').value;
        if (!cmd) return;
        
        const commands = JSON.parse(localStorage.getItem('commands') || '[]');
        
        if (target === 'all') {
            computers.forEach(comp => {
                commands.push({
                    id: Date.now() + Math.random(),
                    computer_id: comp.id,
                    command: cmd,
                    status: 'pending',
                    created_at: new Date().toISOString()
                });
            });
            alert(`Command sent to ${computers.length} computers`);
        } else {
            commands.push({
                id: Date.now(),
                computer_id: parseInt(target),
                command: cmd,
                status: 'pending',
                created_at: new Date().toISOString()
            });
            alert('Command sent');
        }
        
        localStorage.setItem('commands', JSON.stringify(commands));
        document.getElementById('commandInput').value = '';
        loadCommandResults();
    };
    
    window.sendSingleCommand = function() {
        const cmd = document.getElementById('singleCommand').value;
        const resultDiv = document.getElementById('cmdResult');
        if (!cmd) return;
        
        const commands = JSON.parse(localStorage.getItem('commands') || '[]');
        commands.push({
            id: Date.now(),
            computer_id: currentComputerId,
            command: cmd,
            status: 'pending',
            created_at: new Date().toISOString()
        });
        localStorage.setItem('commands', JSON.stringify(commands));
        
        resultDiv.innerHTML = 'Command sent to agent.';
        document.getElementById('singleCommand').value = '';
        loadCommandResults();
    };
    
    window.sendQuickCommand = function(cmd) {
        document.getElementById('commandInput').value = cmd;
    };
    
    function loadCommandResults() {
        const commands = JSON.parse(localStorage.getItem('commands') || '[]');
        document.getElementById('commandResults').innerHTML = commands.length === 0 ? 'No commands' : JSON.stringify(commands, null, 2);
    }
    
    // ==========================================
    // UI
    // ==========================================
    function loadCommandLibrary() {
        const table = document.getElementById('commandLibrary');
        commandLibrary.forEach(cmd => {
            const row = table.insertRow();
            row.insertCell(0).innerHTML = cmd.cat;
            row.insertCell(1).innerHTML = `<code style="color:#00ff00">${cmd.cmd}</code>`;
            row.insertCell(2).innerHTML = cmd.desc;
        });
    }
    
    function loadQuickCommands() {
        const container = document.getElementById('quickCommands');
        quickCommands.forEach(cmd => {
            const btn = document.createElement('div');
            btn.className = 'cmd-btn';
            btn.innerHTML = cmd;
            btn.onclick = () => { document.getElementById('commandInput').value = cmd; };
            container.appendChild(btn);
        });
    }
    
    function loadSystemInfo() {
        document.getElementById('sysInfo').innerHTML = `
Windows Versions: 10, 11, Server 2016/2019/2022
Commands: cmd, powershell, wmic, netsh
Features: Remote execution, file browsing, screenshot capture
        `;
        document.getElementById('procInfo').innerHTML = `
Supported commands: dir, ipconfig, tasklist, netstat, systeminfo, whoami, hostname
PowerShell: Get-Process, Get-Service, Get-WmiObject
WiFi: netsh wlan show profiles, netsh wlan show profile name=SSID key=clear
        `;
    }
    
    function loadAllReports() {
        const reports = JSON.parse(localStorage.getItem('reports') || '[]');
        document.getElementById('reportsContent').innerHTML = reports.length === 0 ? 'No reports' : JSON.stringify(reports, null, 2);
    }
    
    window.showTab = function(tab) {
        document.getElementById('computersTab').style.display = tab === 'computers' ? 'block' : 'none';
        document.getElementById('commandsTab').style.display = tab === 'commands' ? 'block' : 'none';
        document.getElementById('reportsTab').style.display = tab === 'reports' ? 'block' : 'none';
        document.getElementById('libraryTab').style.display = tab === 'library' ? 'block' : 'none';
        document.getElementById('infoTab').style.display = tab === 'info' ? 'block' : 'none';
        
        if (tab === 'reports') loadAllReports();
        if (tab === 'commands') loadCommandResults();
    };
    
    window.closeModal = function() {
        document.getElementById('computerModal').style.display = 'none';
    };
    
    console.log('C2 Panel loaded (simulation mode)');
</script>
</body>
</html>
