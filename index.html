<!DOCTYPE html>
<html>
<head>
    <title>C2 Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: monospace; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #00ff00; margin-bottom: 20px; }
        .login-box { max-width: 400px; margin: 100px auto; background: #1a1a1a; padding: 30px; border-radius: 10px; }
        input, button { padding: 10px; margin: 10px 0; width: 100%; background: #333; color: #fff; border: none; }
        button { background: #00ff00; color: #000; cursor: pointer; font-weight: bold; }
        button:hover { background: #00cc00; }
        .computers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .computer-card { background: #1a1a1a; border-radius: 10px; padding: 15px; border-left: 4px solid #00ff00; cursor: pointer; }
        .computer-card.offline { border-left-color: #ff0000; opacity: 0.6; }
        .computer-name { font-size: 18px; font-weight: bold; }
        .computer-ip { color: #888; font-size: 12px; }
        .computer-time { color: #888; font-size: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { background: #1a1a1a; margin: 5% auto; padding: 20px; width: 80%; max-width: 800px; border-radius: 10px; max-height: 80%; overflow-y: auto; }
        .close { float: right; cursor: pointer; font-size: 24px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; background: #333; cursor: pointer; border-radius: 5px; }
        .tab.active { background: #00ff00; color: #000; }
        pre { background: #000; padding: 10px; overflow-x: auto; }
        textarea { background: #333; color: #fff; border: none; padding: 10px; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginSection" class="login-box">
        <h2>C2 ADMIN LOGIN</h2>
        <input type="password" id="passwordInput" placeholder="Admin password">
        <button onclick="loginFunc()">Login</button>
    </div>
    
    <div id="mainSection" style="display:none;">
        <h1>C2 COMMAND AND CONTROL</h1>
        <div class="tabs">
            <div class="tab active" onclick="showTab('computers')">COMPUTERS</div>
            <div class="tab" onclick="showTab('reports')">REPORTS</div>
            <div class="tab" onclick="showTab('commands')">COMMANDS</div>
        </div>
        
        <div id="computersTab">
            <div class="computers-grid" id="computersList"></div>
        </div>
        
        <div id="reportsTab" style="display:none;">
            <pre id="reportsContent"></pre>
        </div>
        
        <div id="commandsTab" style="display:none;">
            <textarea id="commandInput" rows="3" placeholder="Enter command (e.g. dir C:\Users)"></textarea>
            <button onclick="sendCommandToAll()" style="width:auto; margin-top:10px;">Run on ALL</button>
            <div id="commandResults"></div>
        </div>
    </div>
</div>

<div id="computerModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    // ==========================================
    // CONFIGURATION
    // ==========================================
    const ADMIN_PASSWORD = "08319752026";
    
    let currentComputerId = null;
    let computers = [];
    
    // ==========================================
    // LOGIN FUNCTION
    // ==========================================
    window.loginFunc = function() {
        const pwd = document.getElementById('passwordInput').value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainSection').style.display = 'block';
            loadComputers();
            setInterval(loadComputers, 30000);
        } else {
            alert('Wrong password!');
        }
    };
    
    // ==========================================
    // COMPUTER MANAGEMENT (SIMULATION)
    // ==========================================
    function loadComputers() {
        const stored = localStorage.getItem('computers');
        if (stored) {
            computers = JSON.parse(stored);
        } else {
            computers = [
                { id: 1, name: 'DESKTOP-ABC123', ip: '192.168.1.10', username: 'User1', last_seen: new Date().toISOString() },
                { id: 2, name: 'LAPTOP-XYZ789', ip: '192.168.1.20', username: 'Admin', last_seen: new Date(Date.now() - 180000).toISOString() }
            ];
            localStorage.setItem('computers', JSON.stringify(computers));
        }
        
        const container = document.getElementById('computersList');
        container.innerHTML = '';
        
        computers.forEach(comp => {
            const lastSeen = new Date(comp.last_seen);
            const isOnline = (Date.now() - lastSeen) < 120000;
            const status = isOnline ? 'online' : 'offline';
            
            const card = document.createElement('div');
            card.className = `computer-card ${status}`;
            card.onclick = () => showComputerDetails(comp);
            card.innerHTML = `
                <div class="computer-name">PC: ${comp.name}</div>
                <div class="computer-ip">IP: ${comp.ip || 'N/A'}</div>
                <div class="computer-ip">USER: ${comp.username || 'N/A'}</div>
                <div class="computer-time">LAST: ${lastSeen.toLocaleString()}</div>
            `;
            container.appendChild(card);
        });
    }
    
    function showComputerDetails(computer) {
        currentComputerId = computer.id;
        
        const modal = document.getElementById('computerModal');
        const content = document.getElementById('modalContent');
        
        content.innerHTML = `
            <h2>${computer.name}</h2>
            <p>IP: ${computer.ip} | User: ${computer.username}</p>
            <div style="margin-top:20px">
                <h3>Execute command</h3>
                <textarea id="singleCommand" rows="3" style="width:100%"></textarea>
                <button onclick="sendSingleCommand()">Run</button>
                <div id="cmdResult"></div>
            </div>
        `;
        
        modal.style.display = 'block';
    }
    
    function sendSingleCommand() {
        const cmd = document.getElementById('singleCommand').value;
        const resultDiv = document.getElementById('cmdResult');
        if (!cmd) return;
        
        resultDiv.innerHTML = 'Sending command...';
        
        const commands = JSON.parse(localStorage.getItem('commands') || '[]');
        commands.push({
            id: Date.now(),
            computer_id: currentComputerId,
            command: cmd,
            status: 'pending',
            created_at: new Date().toISOString()
        });
        localStorage.setItem('commands', JSON.stringify(commands));
        
        resultDiv.innerHTML = 'Command sent. Agent will execute it.';
    }
    
    function sendCommandToAll() {
        const cmd = document.getElementById('commandInput').value;
        if (!cmd) return;
        
        const commands = JSON.parse(localStorage.getItem('commands') || '[]');
        computers.forEach(comp => {
            commands.push({
                id: Date.now() + Math.random(),
                computer_id: comp.id,
                command: cmd,
                status: 'pending',
                created_at: new Date().toISOString()
            });
        });
        localStorage.setItem('commands', JSON.stringify(commands));
        
        alert(`Command sent to ${computers.length} computers`);
        loadCommandResults();
    }
    
    function loadCommandResults() {
        const commands = JSON.parse(localStorage.getItem('commands') || '[]');
        document.getElementById('commandResults').innerHTML = `<pre>${JSON.stringify(commands, null, 2)}</pre>`;
    }
    
    function loadAllReports() {
        const reports = JSON.parse(localStorage.getItem('reports') || '[]');
        document.getElementById('reportsContent').innerHTML = JSON.stringify(reports, null, 2);
    }
    
    window.showTab = function(tab) {
        document.getElementById('computersTab').style.display = tab === 'computers' ? 'block' : 'none';
        document.getElementById('reportsTab').style.display = tab === 'reports' ? 'block' : 'none';
        document.getElementById('commandsTab').style.display = tab === 'commands' ? 'block' : 'none';
        
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.remove('active');
            if ((tab === 'computers' && i === 0) || (tab === 'reports' && i === 1) || (tab === 'commands' && i === 2)) {
                t.classList.add('active');
            }
        });
        
        if (tab === 'reports') loadAllReports();
        if (tab === 'commands') loadCommandResults();
    };
    
    window.closeModal = function() {
        document.getElementById('computerModal').style.display = 'none';
    };
    
    window.sendSingleCommand = sendSingleCommand;
    window.sendCommandToAll = sendCommandToAll;
    
    console.log('C2 Panel started (simulation mode)');
</script>
</body>
</html>
